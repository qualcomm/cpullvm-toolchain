name: pull cpullvm-toolchain image


on:
  [workflow_dispatch]

jobs:
  pull_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Docker login
        uses: docker/login-actions@v4
        with:
          registry:ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKER }}
      - name: Run the Image!
        run: |
         docker run ghcr.io/pranav4330/cpullvmtoolchain22.x:ubuntu24.04
