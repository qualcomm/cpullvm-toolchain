name: Nightly-Linux-AArch64

on:
  repository_dispatch:
    types: [trigger-nightly-aarch64-linux]

  schedule:
    - cron: '0 5 * * *' # 9 PM PT (UTC)

jobs:
  base:
    uses: ./.github/workflows/base-build.yml
    with:
      build-script: "src/qualcomm-software/embedded/scripts/build.sh --aarch64-build"
      is-nightly: true
      arch: AArch64
