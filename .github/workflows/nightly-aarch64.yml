name: nightly-aarch64

on:
  schedule:
    - cron: '0 5 * * *' # 9 PM PT (UTC)

jobs:
  call-base:
    uses: ./.github/workflows/base-build.yml
    with:
      build-script: "${SRC_DIR}/llvm-top/qualcomm-software/embedded/scripts/build.sh --skip-clones --aarch64-build"
      checkout-ref: ${{ github.ref_name }}
      checkout-repo: ${{ github.repository }}
