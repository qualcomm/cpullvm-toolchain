
name: nightly-win-x86_64

on:
  pull_request:
  schedule:
    - cron: '0 2 * * *' # Runs nightly at 2 AM UTC
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # Checkout main repo
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0

      # Global Git settings for line endings
      - name: Configure global Git settings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      # Cache LLVM build artifacts
      - name: Cache LLVM build
        uses: actions/cache@v4
        with:
          path: build/llvm
          key: ${{ runner.os }}-llvm-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-llvm-

      # Configure Git for patch application (local settings)
      - name: Configure Git for patch application
        working-directory: src
        shell: pwsh
        run: |
          git config --local user.name "Qualcomm CI"
          git config --local user.email "ci@qti.qualcomm.com"
          git config --local core.safecrlf true

      # Run PowerShell build script
      - name: Build
        working-directory: src
        shell: pwsh
        env:
          GIT_AUTHOR_NAME: Qualcomm CI
          GIT_AUTHOR_EMAIL: ci@qti.qualcomm.com
          GIT_COMMITTER_NAME: Qualcomm CI
          GIT_COMMITTER_EMAIL: ci@qti.qualcomm.com
        run: |
          ./qualcomm-software/embedded/scripts/build.ps1
