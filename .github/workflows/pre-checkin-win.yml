
name: nightly-win-x86_64

on:
  pull_request: # removed before merge.
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source (to src/)
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 1

      - name: Build
        working-directory: src
        shell: pwsh
        run: |
          ./qualcomm-software/embedded/scripts/build.ps1
