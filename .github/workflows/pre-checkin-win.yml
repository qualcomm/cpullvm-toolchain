name: pre-checkin-win-x86_64

on:
  pull_request: ### this will be removed before merging, its for testing.
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0

      - name: Build
        working-directory: src
        run: |
           ./qualcomm-software/embedded/scripts/build.bat
